services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lpk
      POSTGRES_PASSWORD: lpk
      POSTGRES_DB: lpk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lpk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
